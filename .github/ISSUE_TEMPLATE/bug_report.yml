name: Bug Report
description: Report a bug in TwitchKt
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: TwitchKt Version
      description: Which version of TwitchKt are you using?
      placeholder: e.g. 0.3.0
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - twitchkt-core
        - twitchkt-auth
        - twitchkt-helix
        - twitchkt-eventsub
        - twitchkt-irc
        - twitchkt-logging
        - twitchkt-logging-kermit
        - twitchkt-bom
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you targeting?
      options:
        - JVM
        - JS
        - Wasm
        - Multiple
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, stack traces, screenshots, or anything else that might help.
    validations:
      required: false
