name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Validate version
        run: |
          VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d= -f2)
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION_NAME in gradle.properties is '$VERSION' but tag is 'v$TAG'. Update gradle.properties before tagging."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Extract changelog
        run: |
          python3 << 'PYEOF'
          import sys, os

          version = os.environ['VERSION']
          runner_temp = os.environ['RUNNER_TEMP']

          with open('CHANGELOG.md') as f:
              lines = f.read().splitlines()

          section_lines = []
          in_section = False

          for line in lines:
              if line.startswith('## [Unreleased]'):
                  continue
              if line.startswith('## ['):
                  if in_section:
                      break
                  expected = f'## [{version}]'
                  if not line.startswith(expected):
                      print(f"ERROR: Expected '{expected}' but first versioned section is '{line}'", file=sys.stderr)
                      sys.exit(1)
                  in_section = True
                  section_lines.append(line)
              elif in_section:
                  section_lines.append(line)

          notes = '\n'.join(section_lines).strip()
          if not notes:
              print(f"ERROR: No changelog content found for version {version}", file=sys.stderr)
              sys.exit(1)

          out = os.path.join(runner_temp, 'release-notes.md')
          with open(out, 'w') as f:
              f.write(notes + '\n')
          print(f"Extracted changelog for {version}")
          PYEOF

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if echo "$VERSION" | grep -qE 'alpha|beta|rc'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ github.token }}
